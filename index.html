<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unlock Love World 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    background: linear-gradient(-45deg, #ff4d6d, #c77dff, #ff85a1, #7b2cbf);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

#login {
    margin-top: 120px;
    padding: 20px;
}

input {
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
    cursor: pointer;
    background: white;
    color: purple;
    font-weight: bold;
}

#app {
    display: none;
}

/* 💖 main app style */
img {
    width: 240px;
    height: 240px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 35px white;
}

.heart {
    position: fixed;
    top: -10px;
    color: pink;
    animation: fall linear;
}

@keyframes fall {
    to {transform: translateY(110vh);}
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
    <h1>🔐 Unlock Love World</h1>
    <p>What do I call you? 💖</p>

    <input type="text" id="pass" placeholder="Enter password...">
    <br><br>

    <button onclick="checkPass()">Unlock 💖</button>

    <p id="error"></p>
</div>

<!-- 💖 APP -->
<div id="app">
    <h1>Hi My Love 💖</h1>

    <img id="img" src="img1.jpg">

    <br><br>

    <button onclick="startLove()">ENTER LOVE WORLD 💖</button>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
    <source src="love-story.mp3" type="audio/mpeg">
</audio>

<script>
let images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg"];
let i = 0;
let interval;

// 🔐 check password
function checkPass() {
    let input = document.getElementById("pass").value;

    if(input === "Baby") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        document.getElementById("error").innerHTML = "Wrong password 💔 try again";
    }
}

// 💖 start love world
function startLove() {

    document.getElementById("music").play();

    interval = setInterval(() => {
        i = (i + 1) % images.length;

        let img = document.getElementById("img");
        img.style.opacity = 0;

        setTimeout(() => {
            img.src = images[i];
            img.style.opacity = 1;
        }, 300);

    }, 2000);

    setInterval(createHeart, 150);

    alert("Welcome to Love World 💖");
}

// 💖 hearts
function createHeart() {
    let h = document.createElement("div");
    h.innerHTML = "💖";
    h.classList.add("heart");

    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 5000);
}
</script>

</body>
</html>

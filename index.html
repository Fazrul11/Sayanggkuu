<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love World 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* 🎥 video bg */
#bgVideo {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* dark layer */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: -1;
}

/* LOGIN */
#login {
    margin-top: 120px;
    position: relative;
    z-index: 2;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    text-align: center;
    width: 70%;
    max-width: 250px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    margin-top: 10px;
    cursor: pointer;
    background: white;
    color: purple;
    font-weight: bold;
}

/* APP */
#app {
    display: none;
    position: relative;
    z-index: 2;
    padding: 20px;
}

h1 {
    font-size: 22px;
}

/* 📸 image */
img {
    width: 80%;
    max-width: 260px;
    height: 260px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 30px white;
    transition: transform 0.4s ease, opacity 0.4s ease;
}

/* 🔥 zoom FIX MOBILE */
.big {
    transform: scale(1.25);
}

/* 💌 story */
#story {
    display: none;
    margin-top: 15px;
    font-size: 16px;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 10px;
}

/* 💖 hearts */
.heart {
    position: fixed;
    top: -10px;
    color: pink;
    animation: fall linear;
}

@keyframes fall {
    to {transform: translateY(110vh);}
}
</style>
</head>

<body>

<!-- 🎥 VIDEO BACKGROUND -->
<video autoplay muted loop id="bgVideo">
    <source src="bg-video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- 🔐 LOGIN -->
<div id="login">
    <h2>🔐 Unlock Love World</h2>
    <p>What do I call you? 💖</p>

    <input type="text" id="pass" placeholder="Enter password">
    <br><br>

    <button onclick="checkPass()">Unlock 💖</button>

    <p id="error"></p>
</div>

<!-- 💖 APP -->
<div id="app">
    <h2>Hi My Love 💖</h2>

    <img id="img" src="img1.jpg">

    <br><br>

    <button onclick="startLove()">ENTER LOVE WORLD 💖</button>

    <!-- 💌 LOVE TIME (FIXED MOBILE) -->
    <div id="story">
        <h3>💌 Our Love Time</h3>
        <p>💖 First meet → special moment</p>
        <p>💖 Talking everyday → happiness</p>
        <p>💖 Falling in love → heart beat</p>
        <p>💖 Now → forever together</p>
    </div>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
    <source src="love-story.mp3" type="audio/mpeg">
</audio>

<script>
let images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg"];
let i = 0;

// 🔐 password
function checkPass() {
    let input = document.getElementById("pass").value;

    if(input === "Baby") {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        document.getElementById("error").innerHTML = "Wrong 💔 try again";
    }
}

// 💖 start love
function startLove() {

    document.getElementById("music").play();

    document.getElementById("story").style.display = "block";

    setInterval(() => {
        i = (i + 1) % images.length;

        let img = document.getElementById("img");

        img.classList.add("big");

        setTimeout(() => {
            img.src = images[i];
            img.classList.remove("big");
        }, 300);

    }, 2000);

    setInterval(createHeart, 150);

    alert("Welcome to Love World 💖");
}

// 💖 hearts
function createHeart() {
    let h = document.createElement("div");
    h.innerHTML = "💖";
    h.classList.add("heart");

    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (Math.random() * 3 + 2) + "s";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 5000);
}
</script>

</body>
</html>
